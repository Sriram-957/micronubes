<svg class="hero__chart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="40" y1="40" x2="280" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="0.45" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111327" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="320" height="200" rx="16" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.28" stroke="#cfd3e6" stroke-width="1">
    <path d="M24 52h272M24 92h272M24 132h272M24 172h272"/>
    <path d="M64 24v152M120 24v152M176 24v152M232 24v152M288 24v152"/>
  </g>

  <!-- soft gradient blobs -->
  <circle cx="62" cy="44" r="54" fill="#06b6d4" opacity="0.14"/>
  <circle cx="272" cy="52" r="64" fill="#f97316" opacity="0.12"/>
  <circle cx="244" cy="164" r="60" fill="#6d28d9" opacity="0.10"/>

  <!-- wave path -->
  <path
    d="M36 136C64 110 86 154 112 120C142 82 152 124 180 98C206 74 228 114 252 92C272 76 290 70 304 56"
    stroke="url(#wave)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softShadow)"
  />

  <!-- nodes -->
  <g filter="url(#softShadow)">
    <circle cx="36" cy="136" r="4.5" fill="#06b6d4"/>
    <circle cx="112" cy="120" r="4.5" fill="#6d28d9"/>
    <circle cx="180" cy="98" r="4.5" fill="#06b6d4"/>
    <circle cx="252" cy="92" r="4.5" fill="#f97316"/>
    <circle cx="304" cy="56" r="4.5" fill="#22c55e"/>
  </g>

  <!-- small metric pill -->
  <g filter="url(#softShadow)">
    <rect x="188" y="24" width="108" height="34" rx="10" fill="#ffffff" opacity="0.92"/>
    <rect x="188" y="24" width="108" height="34" rx="10" stroke="#d7dbed" opacity="0.85"/>
    <path d="M200 45c7-7 12-2 18-10 7-10 10-3 16-12" stroke="url(#spark)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="200" y="39" fill="#4b4f6a" font-size="10" font-weight="600" font-family="system-ui, sans-serif">Signal</text>
  </g>
</svg>
